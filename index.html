<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readability Scorer | NLP Micro Project</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.875rem;
        }

        /* Main Input Section */
        .input-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 2px solid var(--border);
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fcfcfc;
            margin-bottom: 1.5rem;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-analyze {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
        }

        .btn-analyze:active {
            transform: translateY(0);
        }

        /* Results Dashboard */
        #results {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.25rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            text-align: center;
        }

        .metric-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .metric-card .value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chart-container h3 {
            margin-bottom: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        canvas {
            max-width: 100%;
        }

        /* Suggestions Panel */
        .suggestions-panel {
            background: #fff7ed;
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid #fed7aa;
            margin-bottom: 2rem;
        }

        .suggestions-panel h3 {
            color: #9a3412;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-list li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.75rem;
            color: #c2410c;
            font-weight: 500;
        }

        .suggestion-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #ea580c;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .metrics-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Readability Scorer</h1>
        <p>NLP Micro Project</p>
    </header>

    <div class="input-section">
        <textarea id="textInput" placeholder="Paste your text here..."></textarea>
        <button class="btn-analyze" onclick="analyzeText()">Analyze Readability</button>
    </div>

    <div id="results">
        <div class="metrics-grid">
            <div class="metric-card">
                <h3>Word Count</h3>
                <div class="value" id="wordCount">0</div>
            </div>
            <div class="metric-card">
                <h3>Sentence Count</h3>
                <div class="value" id="sentenceCount">0</div>
            </div>
            <div class="metric-card">
                <h3>Syllable Count</h3>
                <div class="value" id="syllableCount">0</div>
            </div>
            <div class="metric-card">
                <h3>Grade Level</h3>
                <div class="value" id="gradeLevel">0</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>Flesch Reading Ease</h3>
                <canvas id="gaugeChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Sentence Lengths</h3>
                <canvas id="barChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Vocabulary Complexity</h3>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="suggestions-panel" id="suggestionsPanel">
            <h3>💡 Suggestions</h3>
            <ul class="suggestion-list" id="suggestionList">
                <!-- Suggestions will be injected here -->
            </ul>
        </div>
    </div>
</div>

<script>
    let gaugeChart, barChart, pieChart;

    function countSyllables(word) {
        word = word.toLowerCase();
        if (word.length <= 3) return 1;
        word = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
        word = word.replace(/^y/, '');
        const syllables = word.match(/[aeiouy]{1,2}/g);
        return syllables ? syllables.length : 1;
    }

    function analyzeText() {
        const text = document.getElementById('textInput').value.trim();
        if (!text) return alert("Please enter some text!");

        const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
        const words = text.split(/\s+/).filter(w => w.trim().length > 0);
        
        const sentenceCount = sentences.length || 1;
        const wordCount = words.length || 1;
        
        let syllableCount = 0;
        let complexWordCount = 0;
        const sentenceLengths = sentences.map(s => s.trim().split(/\s+/).length);

        words.forEach(word => {
            const cleanWord = word.replace(/[^a-zA-Z]/g, '');
            const syllables = countSyllables(cleanWord);
            syllableCount += syllables;
            if (syllables >= 3) complexWordCount++;
        });

        const avgSentenceLength = wordCount / sentenceCount;
        const avgSyllablesPerWord = syllableCount / wordCount;

        // Flesch Reading Ease
        const readingEase = 206.835 - 1.015 * avgSentenceLength - 84.6 * avgSyllablesPerWord;
        
        // Flesch-Kincaid Grade Level
        const gradeLevel = 0.39 * avgSentenceLength + 11.8 * avgSyllablesPerWord - 15.59;

        // Update Metrics
        document.getElementById('wordCount').innerText = wordCount;
        document.getElementById('sentenceCount').innerText = sentenceCount;
        document.getElementById('syllableCount').innerText = syllableCount;
        document.getElementById('gradeLevel').innerText = Math.max(0, gradeLevel.toFixed(1));

        // Suggestions
        const suggestions = [];
        if (avgSentenceLength > 20) suggestions.push("Shorten your sentences (aim for ~15-20 words).");
        if (complexWordCount / wordCount > 0.15) suggestions.push("Replace complex words with simpler alternatives.");
        if (readingEase < 60) suggestions.push("Improve readability for a general audience.");
        
        const list = document.getElementById('suggestionList');
        list.innerHTML = '';
        if (suggestions.length === 0) {
            list.innerHTML = '<li>Your text is well-optimized!</li>';
        } else {
            suggestions.forEach(s => {
                const li = document.createElement('li');
                li.innerText = s;
                list.appendChild(li);
            });
        }

        // Show Results
        document.getElementById('results').style.display = 'block';
        updateCharts(readingEase, sentenceLengths, wordCount, complexWordCount);
        
        // Scroll to results
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
    }

    function updateCharts(score, sentenceLengths, totalWords, complexWords) {
        // Gauge Chart
        const scoreVal = Math.max(0, Math.min(100, score));
        if (gaugeChart) gaugeChart.destroy();
        gaugeChart = new Chart(document.getElementById('gaugeChart'), {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: [scoreVal, 100 - scoreVal],
                    backgroundColor: [scoreVal > 60 ? '#10b981' : (scoreVal > 30 ? '#f59e0b' : '#ef4444'), '#f1f5f9'],
                    borderWidth: 0
                }]
            },
            options: {
                circumference: 180,
                rotation: 270,
                cutout: '80%',
                plugins: {
                    legend: { display: false },
                    tooltip: { enabled: false }
                }
            }
        });

        // Bar Chart (Sentence Lengths)
        if (barChart) barChart.destroy();
        barChart = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: sentenceLengths.map((_, i) => `S${i+1}`),
                datasets: [{
                    label: 'Words per Sentence',
                    data: sentenceLengths,
                    backgroundColor: '#6366f1',
                    borderRadius: 8
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: false } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Pie Chart (Complexity)
        if (pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: ['Simple Words', 'Complex Words'],
                datasets: [{
                    data: [totalWords - complexWords, complexWords],
                    backgroundColor: ['#6366f1', '#f43f5e'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
</script>

</body>
</html>
